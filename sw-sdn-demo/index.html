<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SDN Acoustic Simulator — Interactive Demo</title>
<script src="https://cdn.plot.ly/plotly-2.27.0.min.js" charset="utf-8"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg:      #2d3038;
  --paper:   #282c34;
  --header:  #1e2129;
  --text:    #e0e0e0;
  --dim:     #888;
  --accent:  #61dafb;
  --border:  rgba(255,255,255,0.12);
  --btn:     #404040;
}
body {
  background: var(--bg);
  color: var(--text);
  font-family: Arial, sans-serif;
  font-size: 13px;
  padding: 8px 10px;
  min-height: 100vh;
}

/* ── Loading overlay ── */
#loading {
  position: fixed; inset: 0;
  background: rgba(0,0,0,.75);
  display: flex; align-items: center; justify-content: center;
  flex-direction: column; gap: 12px;
  font-size: 1.1em; color: var(--accent);
  z-index: 999;
}
#loading-bar-wrap { width: 260px; height: 4px; background: var(--btn); border-radius: 2px; }
#loading-bar { height: 100%; width: 0%; background: var(--accent); border-radius: 2px; transition: width .3s; }

/* ── Top nav bar ── */
#topbar {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 6px; gap: 10px; flex-wrap: wrap;
}
#room-nav { display: flex; align-items: center; gap: 6px; }
#room-nav-name { min-width: 160px; text-align: center; color: var(--accent); font-weight: bold; font-size: 13px; }
#room-info { text-align: center; flex: 1; }
#room-info h3 { font-size: 13px; color: var(--accent); }
#room-info small { color: var(--dim); font-size: 11px; }
#layout-switch { display: flex; align-items: center; gap: 8px; font-size: 12px; color: var(--dim); }

/* ── Buttons ── */
.btn {
  background: var(--btn); color: var(--text);
  border: 1px solid var(--border); border-radius: 4px;
  padding: 2px 8px; cursor: pointer; font-size: 13px;
  transition: background .12s;
}
.btn:hover { background: #505050; }
.btn.icon { width: 26px; height: 26px; padding: 0; font-size: 15px; }

/* ── Main split ── */
#main { display: flex; gap: 10px; }
#left  { flex: 7; min-width: 0; display: flex; flex-direction: column; gap: 6px; }
#right { flex: 3; min-width: 0; }

/* ── Time range ── */
#trange-bar { display: flex; align-items: center; gap: 12px; font-size: 12px; color: var(--dim); }
#trange-bar label { cursor: pointer; }
#trange-bar input[type=radio] { accent-color: var(--accent); }

/* ── Plots ── */
#plot-row { display: flex; gap: 6px; }
.plot-box { flex: 1; min-width: 0; }

/* ── Table section ── */
#table-section { background: var(--paper); border-radius: 4px; padding: 6px 8px; }
#ref-row { display: flex; align-items: center; gap: 10px; margin-bottom: 6px; }
#ref-row label { color: var(--dim); font-size: 12px; white-space: nowrap; }
select {
  background: var(--paper); color: var(--text);
  border: 1px solid var(--border); border-radius: 4px;
  padding: 3px 6px; font-size: 12px;
}
#exp-table { width: 100%; border-collapse: collapse; font-size: 12px; }
#exp-table th {
  background: var(--header); color: var(--text); text-align: left;
  padding: 4px 8px; font-weight: bold; white-space: nowrap;
}
#exp-table td {
  background: var(--paper); color: var(--text);
  padding: 3px 8px; border-bottom: 1px solid var(--border);
  white-space: nowrap;
}
#exp-table tr.is-ref      td { background: rgba(97,218,251,0.08); }
#exp-table tr.is-sdn-orig td { background: rgba(255,160,50,0.10); }  /* SDN original — always amber */
#exp-table tr.is-best     td { background: rgba(80,220,120,0.13); }  /* min RMSE row — green */
#exp-table tr.is-sdn-orig.is-best td { background: rgba(80,220,120,0.13); } /* best wins if both */

/* ── Summary table ── */
#summary-table th, #summary-table td {
  background: var(--paper); color: var(--text);
  padding: 2px 5px; border-bottom: 1px solid var(--border);
  white-space: nowrap; text-align: right;
}
#summary-table th { background: var(--header); text-align: left; }
#summary-table td:first-child { text-align: left; }
#summary-table tr.is-sdn-orig td { background: rgba(255,160,50,0.10); }
#summary-table tr.is-best-sum  td { background: rgba(80,220,120,0.13); }
.summary-metric-btn.active { background: var(--accent); color: #1a1a1a; }
.dot { display: inline-block; width: 10px; height: 10px; border-radius: 50%; margin-right: 5px; flex-shrink: 0; }

/* ── Right panel ── */
#right h4 { color: var(--dim); font-size: 11px; margin-bottom: 4px; }
.sel-row { display: flex; align-items: center; gap: 6px; margin: 5px 0; }
.sel-row label { font-size: 11px; color: var(--dim); white-space: nowrap; }
.sel-row select { flex: 1; }
#rec-nav { display: flex; justify-content: center; gap: 8px; margin-top: 6px; }
#pos-info { font-size: 10px; color: var(--dim); margin-top: 4px; text-align: center; line-height: 1.5; }
</style>
</head>
<body>

<!-- ── Loading ─────────────────────────────────────────────────────────────── -->
<div id="loading">
  <span id="loading-msg">Loading data…</span>
  <div id="loading-bar-wrap"><div id="loading-bar"></div></div>
</div>

<!-- ── Top bar ────────────────────────────────────────────────────────────── -->
<div id="topbar">
  <a href="/sw-sdn/" style="color:var(--dim);font-size:12px;text-decoration:none;white-space:nowrap;padding:4px 0;">← Paper</a>
  <div id="room-nav">
    <button class="btn icon" id="btn-prev-room">←</button>
    <span id="room-nav-name">—</span>
    <button class="btn icon" id="btn-next-room">→</button>
  </div>
  <div id="room-info">
    <h3 id="room-title">—</h3>
    <small id="room-sub">—</small>
  </div>
  <div id="layout-switch">
    Layout:
    <label><input type="radio" name="layout" value="monitor" checked> Monitor</label>
    <label><input type="radio" name="layout" value="laptop"> Laptop</label>
  </div>
</div>

<!-- ── Main ───────────────────────────────────────────────────────────────── -->
<div id="main">

  <!-- Left: plots + table -->
  <div id="left">

    <!-- Time range selector -->
    <div id="trange-bar">
      <span>Time range:</span>
      <label><input type="radio" name="tr" value="0.05" checked> Early (50 ms)</label>
      <label><input type="radio" name="tr" value="0.5"> 0–500 ms</label>
      <label><input type="radio" name="tr" value="full"> Full (1 s)</label>
    </div>

    <!-- Plots -->
    <div id="plot-row">
      <div class="plot-box"><div id="edc-plot" style="height:52vh"></div></div>
      <div class="plot-box"><div id="rir-plot" style="height:52vh"></div></div>
    </div>

    <!-- Table -->
    <div id="table-section">
      <div id="ref-row">
        <label>Reference:</label>
        <select id="ref-sel" style="min-width:200px"></select>
        <span id="ref-info" style="color:var(--dim);font-size:11px;margin-left:6px"></span>
      </div>
      <table id="exp-table">
        <thead>
          <tr>
            <th>#</th>
            <th>Experiment</th>
            <th>RT60</th>
            <th>RMSE [0–50ms]</th>
            <th title="|C50_method − C50_ref| at this receiver">|ΔC50| (dB)</th>
            <th title="|C80_method − C80_ref| at this receiver">|ΔC80| (dB)</th>
          </tr>
        </thead>
        <tbody id="exp-tbody"></tbody>
      </table>
    </div>
  </div>

  <!-- Right: room + selectors -->
  <div id="right">
    <h4>Room (top view)</h4>
    <div id="room-plot" style="height:38vh"></div>
    <div class="sel-row">
      <label>Source:</label>
      <select id="src-sel"></select>
    </div>
    <div class="sel-row">
      <label>Receiver:</label>
      <select id="rec-sel"></select>
    </div>
    <div id="rec-nav">
      <button class="btn icon" id="btn-prev-rec">←</button>
      <button class="btn icon" id="btn-next-rec">→</button>
    </div>
    <div id="pos-info"></div>

    <!-- Summary table: mean ± σ across all 16 receivers -->
    <div id="summary-section" style="margin-top:10px">
      <div style="display:flex;align-items:center;gap:6px;margin-bottom:4px;flex-wrap:wrap">
        <span style="color:var(--dim);font-size:11px">Summary (mean ± σ, all rec):</span>
        <span id="summary-metric-btns" style="display:flex;gap:3px">
          <button class="btn summary-metric-btn" data-m="rmse" style="font-size:11px;padding:1px 6px">RMSE</button>
          <button class="btn summary-metric-btn" data-m="rt60" style="font-size:11px;padding:1px 6px">RT60</button>
          <button class="btn summary-metric-btn" data-m="c50"  style="font-size:11px;padding:1px 6px">|ΔC50|</button>
          <button class="btn summary-metric-btn" data-m="c80"  style="font-size:11px;padding:1px 6px">|ΔC80|</button>
        </span>
      </div>
      <table id="summary-table" style="width:100%;border-collapse:collapse;font-size:11px">
        <thead>
          <tr id="summary-thead-row">
            <th style="background:var(--header);padding:3px 5px;text-align:left;white-space:nowrap">Method</th>
          </tr>
        </thead>
        <tbody id="summary-tbody"></tbody>
      </table>
    </div>
  </div>

</div><!-- #main -->

<!-- ── JavaScript ─────────────────────────────────────────────────────────── -->
<script>
'use strict';

// ── State ─────────────────────────────────────────────────────────────────────
let D        = null;   // parsed data.json
let selRoom  = 0;  // default: full grid (index 0 when QG is disabled)
let selSrc   = 0;
let selRec   = 0;
let refKey   = null;   // exp_key of reference experiment
let trange   = 0.05;   // seconds or 'full'
let curLayout = 'monitor';
let roomInitialized = false;
let summaryMetric = 'rmse';  // 'rmse' | 'c50' | 'c80'

// Persisted zoom: set by user pan/zoom, cleared on time-range or room change
let edcSavedRanges = null;   // {x:[min,max], y:[min,max]} or null
let rirSavedRanges = null;

// Persisted legend visibility: trace name -> true | 'legendonly' (shared between both plots)
let traceVisibility = {};
let syncingVis = false;

// ── Color palette — fixed global order ensures same method = same color across rooms ──
const PALETTE = [
  '#61dafb','#ff6b6b','#ffd93d','#6bcb77','#c77dff',
  '#ff9f43','#48dbfb','#ff6b9d','#a8e063','#f8b739',
  '#74b9ff','#fd79a8','#55efc4','#e17055','#a29bfe',
  '#00b894','#fdcb6e','#e84393','#00cec9','#6c5ce7',
];
const GLOBAL_KEY_ORDER = [
  'ISM/order100_rand','RIMPY/negref','RIMPY/neg10',
  'SDN/sw-3','SDN/sw-1','SDN/original',
  'SDN/sw3','SDN/sw5','SDN/sw6','SDN/sw7',
  'HO-SDN/N2','HO-SDN/N3',
];
const KEY_COLOR = {};

function initColors() {
  GLOBAL_KEY_ORDER.forEach((k, i) => { KEY_COLOR[k] = PALETTE[i % PALETTE.length]; });
}

function colorFor(method, param_set) {
  return KEY_COLOR[`${method}/${param_set}`] || '#aaa';
}

// ── Accessors ─────────────────────────────────────────────────────────────────
function getRoom()   { return D.rooms[selRoom]; }
function posIdx()    { return selSrc * getRoom().receivers.length + selRec; }
function getPos()    { return getRoom().positions[posIdx()]; }

// ── RMSE helper ───────────────────────────────────────────────────────────────
function rmse(a, b, nMax) {
  const n = Math.min(a.length, b.length, nMax);
  let s = 0;
  for (let i = 0; i < n; i++) s += (a[i] - b[i]) ** 2;
  return Math.sqrt(s / n).toFixed(5);
}

// ── Default axis ranges per time selection ────────────────────────────────────
function edcDefaultXRange() {
  if (trange === 'full') return [0, 1.0];
  if (trange >= 0.5)    return [0, 0.5];
  return [0, 0.07];  // early 50ms — show a bit beyond 50ms for context
}
function edcDefaultYRange() {
  if (trange === 'full') return [-65, 0.5];
  if (trange >= 0.5)    return [-35, 0.5];
  return [-10, 0.5];  // early 50ms
}
function rirDefaultXRange() {
  const last = getRoom().rir_time.at(-1);
  if (trange === 'full') return [0, last];
  if (trange >= 0.5)    return [0, Math.min(0.5, last)];
  return [0, Math.min(0.07, last)];
}

// ── Dark plot layout factory ──────────────────────────────────────────────────
function darkLayout(title, xLabel, yLabel, xr, yr, legendCfg) {
  return {
    paper_bgcolor: '#282c34', plot_bgcolor: '#1e2129',
    font: { color: '#e0e0e0', size: 11 },
    title: { text: title, font: { size: 12, color: '#e0e0e0' }, x: 0.5, xanchor: 'center', pad: { t: 2 } },
    margin: { t: 28, b: 42, l: 52, r: 14 },
    xaxis: {
      title: { text: xLabel, font: { size: 11 } },
      range: xr, color: '#aaa',
      gridcolor: 'rgba(255,255,255,0.07)', zeroline: false,
    },
    yaxis: {
      title: { text: yLabel, font: { size: 11 } },
      range: yr, color: '#aaa',
      gridcolor: 'rgba(255,255,255,0.07)', zeroline: false,
    },
    showlegend: true,
    legend: legendCfg || {
      x: 0.99, y: 0.02, xanchor: 'right', yanchor: 'bottom',
      bgcolor: 'rgba(28,32,40,0.88)', bordercolor: 'rgba(255,255,255,0.13)',
      borderwidth: 1, font: { size: 8.5 }, tracegroupgap: 1,
    },
    hovermode: 'closest',
    hoverlabel: { bgcolor: '#1e2129', bordercolor: '#555', font: { color: '#e0e0e0', size: 10 } },
  };
}

// ── Room plot ─────────────────────────────────────────────────────────────────
function renderRoom() {
  const rm = getRoom();
  const W = rm.room.width, H = rm.room.depth;

  // Dim: all receivers
  const rTrace = {
    x: rm.receivers.map(r => r[0]),
    y: rm.receivers.map(r => r[1]),
    mode: 'markers',
    marker: { color: '#4CAF50', size: 9, opacity: 0.22,
               line: { color: '#4CAF50', width: 1 } },
    customdata: rm.receivers.map((_, i) => ['rec', i]),
    hovertext: rm.receivers.map((r, i) => `Rec ${i+1}: (${r[0]}, ${r[1]}, ${r[2]})`),
    hoverinfo: 'text', name: 'Receivers', showlegend: false, type: 'scatter',
  };

  // Dim: all sources
  const sTrace = {
    x: rm.sources.map(s => s.position[0]),
    y: rm.sources.map(s => s.position[1]),
    mode: 'markers',
    marker: { color: '#f44336', size: 14, opacity: 0.25, symbol: 'star',
               line: { color: '#f44336', width: 1 } },
    customdata: rm.sources.map((_, i) => ['src', i]),
    hovertext: rm.sources.map(s => `${s.label}`),
    hoverinfo: 'text', name: 'Sources', showlegend: false, type: 'scatter',
  };

  // Active receiver
  const ar = rm.receivers[selRec];
  const arTrace = {
    x: [ar[0]], y: [ar[1]], mode: 'markers',
    marker: { color: '#4CAF50', size: 14, line: { color: 'white', width: 2 } },
    hovertext: [`Active Rec ${selRec+1}`], hoverinfo: 'text',
    name: 'Active Rec', showlegend: true, type: 'scatter',
  };

  // Active source
  const as = rm.sources[selSrc];
  const asTrace = {
    x: [as.position[0]], y: [as.position[1]], mode: 'markers',
    marker: { color: '#f44336', size: 16, symbol: 'star', line: { color: 'white', width: 2 } },
    hovertext: [as.label], hoverinfo: 'text',
    name: 'Active Src', showlegend: true, type: 'scatter',
  };

  const lay = {
    paper_bgcolor: '#282c34', plot_bgcolor: '#1e2129',
    font: { color: '#e0e0e0', size: 10 },
    margin: { t: 6, b: 32, l: 36, r: 6 },
    xaxis: { title: 'Width (m)', range: [-0.4, W+0.4],
              gridcolor: 'rgba(255,255,255,0.07)', zeroline: false, color: '#aaa' },
    yaxis: { title: 'Depth (m)', range: [-0.4, H+0.4],
              scaleanchor: 'x', scaleratio: 1,
              gridcolor: 'rgba(255,255,255,0.07)', zeroline: false, color: '#aaa' },
    showlegend: true,
    legend: { x: 0.02, y: 0.02, xanchor: 'left', yanchor: 'bottom',
               bgcolor: 'rgba(30,33,41,0.85)', bordercolor: 'rgba(255,255,255,0.15)',
               borderwidth: 1, font: { size: 9 } },
    shapes: [{
      type: 'rect', x0: 0, y0: 0, x1: W, y1: H,
      line: { color: 'rgba(255,255,255,0.35)', width: 2 },
      fillcolor: 'rgba(50,50,65,0.15)',
    }],
    clickmode: 'event',
  };

  const el = document.getElementById('room-plot');
  Plotly.react(el, [rTrace, sTrace, arTrace, asTrace], lay,
               { displayModeBar: false, responsive: true });

  if (!roomInitialized) {
    el.on('plotly_click', ev => {
      if (!ev.points?.[0]) return;
      const cd = ev.points[0].customdata;
      if (!cd) return;
      if (cd[0] === 'src') { selSrc = cd[1]; selRec = 0; updateAll(); }
      else if (cd[0] === 'rec') { selRec = cd[1]; updateAll(); }
    });
    roomInitialized = true;
  }
}

// ── EDC plot ──────────────────────────────────────────────────────────────────
function renderEDC() {
  const pos = getPos();
  const t   = getRoom().edc_time;

  const traces = pos.experiments.map(exp => ({
    x: t, y: exp.edc,
    type: 'scatter', mode: 'lines',
    name: exp.label,
    visible: traceVisibility[exp.label] !== undefined ? traceVisibility[exp.label] : true,
    line: { color: colorFor(exp.method, exp.param_set), width: 1.5 },
    hovertemplate: '%{y:.2f} dB<extra></extra>',
  }));

  const xr = edcSavedRanges ? edcSavedRanges.x : edcDefaultXRange();
  const yr = edcSavedRanges ? edcSavedRanges.y : edcDefaultYRange();
  const lay = darkLayout('Energy Decay Curve', 'Time (s)', 'Level (dB)', xr, yr);
  Plotly.react('edc-plot', traces, lay, { responsive: true });
}

// ── RIR plot ──────────────────────────────────────────────────────────────────
function renderRIR() {
  const pos = getPos();
  const t   = getRoom().rir_time;

  const traces = pos.experiments.map(exp => ({
    x: t, y: exp.rir,
    type: 'scatter', mode: 'lines',
    name: exp.label,
    visible: traceVisibility[exp.label] !== undefined ? traceVisibility[exp.label] : true,
    line: { color: colorFor(exp.method, exp.param_set), width: 1 },
    hovertemplate: '%{y:.4f}<extra></extra>',
  }));

  // Fixed symmetric y-range from ALL traces (visibility-independent)
  let peak = 0;
  for (const exp of pos.experiments)
    for (const v of exp.rir) { const a = Math.abs(v); if (a > peak) peak = a; }
  const defaultYr = peak > 0 ? [-(peak * 1.05), peak * 1.05] : [-1.05, 1.05];

  const xr = rirSavedRanges ? rirSavedRanges.x : rirDefaultXRange();
  const yr = rirSavedRanges?.y ?? defaultYr;
  const lay = darkLayout('Room Impulse Response', 'Time (s)', 'Amplitude', xr, yr);
  Plotly.react('rir-plot', traces, lay, { responsive: true });
}

// ── Experiment table ──────────────────────────────────────────────────────────
function renderTable() {
  const pos  = getPos();
  const exps = pos.experiments;

  // n_50ms and n_500ms: how many EDC points correspond to those durations
  const edc_t = getRoom().edc_time;
  const dt    = edc_t[1] - edc_t[0];
  const n50   = Math.min(Math.ceil(0.05  / dt), edc_t.length);

  const refExp = exps.find(e => `${e.method}/${e.param_set}` === refKey);

  // Pre-compute all RMSE values to find the minimum
  const rmse50s = exps.map(exp => {
    const ek = `${exp.method}/${exp.param_set}`;
    if (!refExp || ek === refKey) return null;
    return parseFloat(rmse(refExp.edc, exp.edc, n50));
  });
  const validRmse = rmse50s.filter(v => v !== null && isFinite(v));
  const minRmse50 = validRmse.length ? Math.min(...validRmse) : null;

  const tbody = document.getElementById('exp-tbody');
  tbody.innerHTML = '';

  exps.forEach((exp, i) => {
    const ek      = `${exp.method}/${exp.param_set}`;
    const isRef   = (ek === refKey);
    const isSdnOrig = (exp.method === 'SDN' && exp.param_set === 'original');
    const isBest  = (minRmse50 !== null && rmse50s[i] !== null &&
                     Math.abs(rmse50s[i] - minRmse50) < 1e-9);

    const tr = document.createElement('tr');
    if (isRef)    tr.classList.add('is-ref');
    if (isSdnOrig && !isRef) tr.classList.add('is-sdn-orig');
    if (isBest)   tr.classList.add('is-best');

    const r50  = rmse50s[i] !== null ? rmse50s[i].toFixed(2) : (isRef ? '—' : 'N/A');

    const refC50 = refExp ? refExp.c50 : null;
    const refC80 = refExp ? refExp.c80 : null;
    const c50v = (!isRef && exp.c50 !== null && exp.c50 !== undefined && refC50 !== null)
               ? Math.abs(exp.c50 - refC50).toFixed(2) : (isRef ? '—' : '—');
    const c80v = (!isRef && exp.c80 !== null && exp.c80 !== undefined && refC80 !== null)
               ? Math.abs(exp.c80 - refC80).toFixed(2) : (isRef ? '—' : '—');

    // badges after label
    const badges = (isSdnOrig && !isRef ? ' <span style="font-size:9px;color:#ffa030;opacity:.8">orig</span>' : '')
                 + (isBest              ? ' <span style="font-size:9px;color:#50dc78;opacity:.9">★ best</span>' : '');

    tr.innerHTML =
      `<td>${i+1}</td>` +
      `<td><span class="dot" style="background:${colorFor(exp.method, exp.param_set)}"></span>${exp.label}${isRef ? ' ★' : ''}${badges}</td>` +
      `<td>${exp.rt60 !== null ? exp.rt60.toFixed(2) + ' s' : '—'}</td>` +
      `<td>${r50}</td>` +
      `<td>${c50v}</td>` +
      `<td>${c80v}</td>`;
    tbody.appendChild(tr);
  });
}

// ── Summary table (mean ± σ per source, all receivers) ────────────────────────
function renderSummaryTable() {
  const room = getRoom();

  // Fixed source column order — label-to-short display name
  const SRC_ORDER = ['Center_Source','Top_Middle_Source','Lower_Left_Source','Upper_Right_Source'];
  const SRC_SHORT = {
    Center_Source:      'Ctr',
    Top_Middle_Source:  'T-Mid',
    Lower_Left_Source:  'L-Left',
    Upper_Right_Source: 'U-Rt',
  };
  const srcLabels = room.sources.map(s => s.label);
  const cols = SRC_ORDER.filter(s => srcLabels.includes(s));

  // For each source, grab position[rec=0] to read precomputed aggregates
  const srcPos0 = {};
  cols.forEach(sl => {
    srcPos0[sl] = room.positions.find(p => p.source_label === sl && p.receiver_idx === 0);
  });

  // Metric accessors
  const METRICS = {
    rmse: { mean: 'mean_rmse50', std: 'std_rmse50', dp: 2 },
    rt60: { mean: 'mean_rt60',   std: 'std_rt60',   dp: 2 },
    c50:  { mean: 'mean_c50',    std: 'std_c50',    dp: 2 },
    c80:  { mean: 'mean_c80',    std: 'std_c80',    dp: 2 },
  };
  const { mean: mk, std: sk, dp } = METRICS[summaryMetric];

  // Update active button style
  document.querySelectorAll('.summary-metric-btn').forEach(b =>
    b.classList.toggle('active', b.dataset.m === summaryMetric));

  // Build header
  const thead = document.getElementById('summary-thead-row');
  thead.innerHTML = `<th style="background:var(--header);padding:3px 5px;text-align:left;white-space:nowrap">Method</th>` +
    cols.map(sl => `<th style="background:var(--header);padding:3px 5px;white-space:nowrap">${SRC_SHORT[sl]}</th>`).join('');

  const allMethods = room.exp_keys;

  // Per-column: find the exp_key of the best method.
  // RMSE    → lowest value (already a distance from ISM).
  // C50/C80 → closest absolute distance to the fixed ISM reference value.
  const colBestEk = {};
  cols.forEach(sl => {
    const pos = srcPos0[sl];
    if (!pos) { colBestEk[sl] = null; return; }

    // Highlight always tracks the RMSE-best method, regardless of displayed metric
    let best = Infinity, bestEk = null;
    pos.experiments.forEach(exp => {
      const v = exp['mean_rmse50'];
      if (v === null || v === undefined) return;
      if (v < best) { best = v; bestEk = `${exp.method}/${exp.param_set}`; }
    });
    colBestEk[sl] = bestEk;
  });

  const tbody = document.getElementById('summary-tbody');
  tbody.innerHTML = '';

  allMethods.forEach(ek => {
    // Get experiment from any source's pos0 to read label/method/param_set
    let meta = null;
    for (const sl of cols) {
      const pos = srcPos0[sl];
      if (pos) { meta = pos.experiments.find(e => `${e.method}/${e.param_set}` === ek); }
      if (meta) break;
    }
    if (!meta) return;

    const isSdnOrig = (meta.method === 'SDN' && meta.param_set === 'original');
    const tr = document.createElement('tr');
    if (isSdnOrig) tr.classList.add('is-sdn-orig');

    let html = `<td><span class="dot" style="background:${colorFor(meta.method,meta.param_set)}"></span>${meta.label}</td>`;
    cols.forEach(sl => {
      const pos = srcPos0[sl];
      const exp = pos ? pos.experiments.find(e => `${e.method}/${e.param_set}` === ek) : null;
      if (!exp) { html += `<td>—</td>`; return; }
      const mv = exp[mk], sv = exp[sk];
      if (mv === null || mv === undefined) { html += `<td>—</td>`; return; }
      const isBest = (colBestEk[sl] !== null && ek === colBestEk[sl]);
      const cellStyle = isBest ? ' style="color:#50dc78;font-weight:bold"' : '';
      const sdStr = (sv !== null && sv !== undefined) ? `<span style="color:var(--dim);font-size:10px"> ±${sv.toFixed(dp)}</span>` : '';
      html += `<td${cellStyle}>${mv.toFixed(dp)}${sdStr}</td>`;
    });
    tr.innerHTML = html;
    tbody.appendChild(tr);
  });
}

// ── Reference dropdown ────────────────────────────────────────────────────────
function buildRefSel() {
  const pos  = getPos();
  const sel  = document.getElementById('ref-sel');
  const prev = refKey;
  sel.innerHTML = '<option value="">— no reference —</option>';
  pos.experiments.forEach(exp => {
    const ek  = `${exp.method}/${exp.param_set}`;
    const opt = document.createElement('option');
    opt.value = ek; opt.textContent = exp.label;
    if (ek === prev) opt.selected = true;
    sel.appendChild(opt);
  });
  // Default to ISM (or RIM-Py as fallback) if no reference chosen yet
  if (!prev) {
    const def = pos.experiments.find(e => e.method === 'ISM')
             || pos.experiments.find(e => e.method === 'RIMPY')
             || pos.experiments[0];
    if (def) {
      refKey = `${def.method}/${def.param_set}`;
      sel.value = refKey;
    }
  }
  refKey = sel.value || null;
}

// ── Source / receiver dropdowns ───────────────────────────────────────────────
function buildDropdowns() {
  const rm = getRoom();
  const ss = document.getElementById('src-sel');
  const rs = document.getElementById('rec-sel');
  ss.innerHTML = '';
  rm.sources.forEach((s, i) => {
    const o = document.createElement('option');
    o.value = i; o.textContent = s.label;
    if (i === selSrc) o.selected = true;
    ss.appendChild(o);
  });
  rs.innerHTML = '';
  rm.receivers.forEach((r, i) => {
    const o = document.createElement('option');
    const fmt = v => parseFloat(v.toFixed(2));
    o.value = i; o.textContent = `R${i+1}  (${fmt(r[0])}, ${fmt(r[1])})`;
    if (i === selRec) o.selected = true;
    rs.appendChild(o);
  });
}

// ── Top bar + pos info ────────────────────────────────────────────────────────
function updateHeader() {
  const room = getRoom();
  const rm  = room.room;
  const src = room.sources[selSrc];
  const rec = room.receivers[selRec];
  document.getElementById('room-nav-name').textContent = room.display_name;
  document.getElementById('room-title').textContent =
    `${rm.display_name}  (${rm.width} × ${rm.depth} × ${rm.height} m,  α = ${rm.absorption})`;
  const V    = rm.width * rm.depth * rm.height;
  const S    = 2*(rm.width*rm.depth + rm.width*rm.height + rm.depth*rm.height);
  const rt60 = (0.161 * V / (S * rm.absorption)).toFixed(2);
  document.getElementById('room-sub').textContent =
    `Sabine RT60 ≈ ${rt60} s  |  Receiver ${selRec+1} / ${room.receivers.length}`;
  const f2 = v => (+v).toFixed(2);
  document.getElementById('pos-info').innerHTML =
    `Src: (${src.position.map(f2).join(', ')})<br>Rec: (${rec.map(f2).join(', ')})`;
}

// ── Register Plotly events (called once after first render) ───────────────────
function registerPlotEvents() {
  function captureRelayout(elId, saveRef) {
    document.getElementById(elId).on('plotly_relayout', ev => {
      if (ev['xaxis.autorange'] || ev['yaxis.autorange']) {
        saveRef.val = null; return;
      }
      const x0 = ev['xaxis.range[0]'], x1 = ev['xaxis.range[1]'];
      const y0 = ev['yaxis.range[0]'], y1 = ev['yaxis.range[1]'];
      if (x0 !== undefined && y0 !== undefined)
        saveRef.val = { x: [x0, x1], y: [y0, y1] };
      else if (x0 !== undefined)
        saveRef.val = { x: [x0, x1], y: saveRef.val ? saveRef.val.y : null };
    });
  }

  function captureVisibility(elId, otherRenderFn) {
    document.getElementById(elId).on('plotly_restyle', (eventData) => {
      if (syncingVis || !Array.isArray(eventData)) return;
      const update  = eventData[0];
      const indices = eventData[1];
      if (!update || update.visible === undefined || !Array.isArray(indices)) return;
      const plot   = document.getElementById(elId);
      const visArr = Array.isArray(update.visible)
        ? update.visible
        : new Array(indices.length).fill(update.visible);
      indices.forEach((ti, i) => {
        const trace = plot.data[ti];
        if (trace && trace.name)
          traceVisibility[trace.name] = visArr[i] !== undefined ? visArr[i] : visArr[0];
      });
      // defer so Plotly finishes the current click before we re-render the other plot
      setTimeout(() => {
        syncingVis = true;
        otherRenderFn();
        syncingVis = false;
      }, 0);
    });
  }

  // Use wrapper objects so the reference can be read/written from closures
  const edcRef = { get val() { return edcSavedRanges; }, set val(v) { edcSavedRanges = v; } };
  const rirRef = { get val() { return rirSavedRanges; }, set val(v) { rirSavedRanges = v; } };
  captureRelayout('edc-plot', edcRef);
  captureRelayout('rir-plot', rirRef);
  captureVisibility('edc-plot', renderRIR);
  captureVisibility('rir-plot', renderEDC);
}

// ── Align summary section with main table header ──────────────────────────────
function alignSummary() {
  const th  = document.querySelector('#exp-table thead th');
  const sec = document.getElementById('summary-section');
  if (!th || !sec) return;
  sec.style.marginTop = '0';
  const gap = th.getBoundingClientRect().top - sec.getBoundingClientRect().top;
  sec.style.marginTop = Math.max(0, gap) + 'px';
}

// ── Master update ─────────────────────────────────────────────────────────────
function updateAll() {
  updateHeader();
  buildDropdowns();
  buildRefSel();
  renderRoom();
  renderEDC();
  renderRIR();
  renderTable();
  renderSummaryTable();
  alignSummary();
}

// ── Layout switch (just changes flex direction) ───────────────────────────────
function applyLayout(l) {
  curLayout = l;
  const row = document.getElementById('plot-row');
  if (l === 'laptop') {
    row.style.flexDirection = 'column';
    row.querySelectorAll('.plot-box').forEach(b => b.style.width = '100%');
  } else {
    row.style.flexDirection = 'row';
    row.querySelectorAll('.plot-box').forEach(b => b.style.width = '');
  }
  setTimeout(() => {
    Plotly.relayout('edc-plot', {autosize: true});
    Plotly.relayout('rir-plot', {autosize: true});
  }, 50);
}

// ── Wire all non-Plotly events ────────────────────────────────────────────────
function wireEvents() {
  document.getElementById('btn-prev-room').onclick = () => {
    selRoom = (selRoom - 1 + D.rooms.length) % D.rooms.length;
    selSrc = 0; selRec = 0; refKey = null;
    edcSavedRanges = null; rirSavedRanges = null;
    traceVisibility = {};
    roomInitialized = false; updateAll();
  };
  document.getElementById('btn-next-room').onclick = () => {
    selRoom = (selRoom + 1) % D.rooms.length;
    selSrc = 0; selRec = 0; refKey = null;
    edcSavedRanges = null; rirSavedRanges = null;
    traceVisibility = {};
    roomInitialized = false; updateAll();
  };
  document.getElementById('btn-prev-rec').onclick = () => {
    selRec = (selRec - 1 + getRoom().receivers.length) % getRoom().receivers.length; updateAll();
  };
  document.getElementById('btn-next-rec').onclick = () => {
    selRec = (selRec + 1) % getRoom().receivers.length; updateAll();
  };

  document.getElementById('src-sel').onchange = e => {
    selSrc = +e.target.value; selRec = 0; updateAll();
  };
  document.getElementById('rec-sel').onchange = e => {
    selRec = +e.target.value; updateAll();
  };
  document.getElementById('ref-sel').onchange = e => {
    refKey = e.target.value || null; renderTable();
  };

  document.querySelectorAll('input[name="layout"]').forEach(r => {
    r.onchange = e => applyLayout(e.target.value);
  });

  document.querySelectorAll('input[name="tr"]').forEach(r => {
    r.onchange = e => {
      trange = e.target.value === 'full' ? 'full' : parseFloat(e.target.value);
      edcSavedRanges = null;  // reset saved zoom when switching time range
      rirSavedRanges = null;
      renderEDC();
      renderRIR();
    };
  });

  document.querySelectorAll('.summary-metric-btn').forEach(b => {
    b.onclick = () => { summaryMetric = b.dataset.m; renderSummaryTable(); };
  });
}

// ── Init ──────────────────────────────────────────────────────────────────────
async function init() {
  const bar = document.getElementById('loading-bar');
  const msg = document.getElementById('loading-msg');

  try {
    msg.textContent = 'Fetching data…';
    bar.style.width = '20%';

    const resp = await fetch('./data.json.gz');
    if (!resp.ok) throw new Error(`HTTP ${resp.status} — make sure data.json.gz exists (run precompute.py first)`);

    bar.style.width = '60%';
    msg.textContent = 'Decompressing…';
    const decompressed = new Response(resp.body.pipeThrough(new DecompressionStream('gzip')));
    msg.textContent = 'Parsing…';
    D = await decompressed.json();

    bar.style.width = '85%';
    msg.textContent = 'Rendering…';

    initColors();
    wireEvents();
    updateAll();
    registerPlotEvents();  // must be after first render so Plotly elements exist
    window.addEventListener('resize', alignSummary);

    bar.style.width = '100%';
    await new Promise(r => setTimeout(r, 200));
    document.getElementById('loading').style.display = 'none';

  } catch (err) {
    msg.textContent = `⚠ ${err.message}`;
    bar.style.background = '#ff6b6b';
    bar.style.width = '100%';
    console.error(err);
  }
}

init();
</script>
